name: Release (build & push images)

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # guard: build+push chỉ khi giá trị này != '' (image FE cần public URL baked
          # lúc build → chưa cấu hình repo variable thì skip, tránh push image hỏng).
          - name: core
            context: ./services/core
            dockerfile: ./services/core/Dockerfile
            guard: "always"
            build-args: |
              GIT_SHA=${{ github.sha }}
          - name: web
            context: .
            dockerfile: ./apps/web/Dockerfile
            guard: ${{ vars.NEXT_PUBLIC_MEDIA_HOST }}
            build-args: |
              NEXT_PUBLIC_MEDIA_HOST=${{ vars.NEXT_PUBLIC_MEDIA_HOST }}
          - name: admin
            context: .
            dockerfile: ./apps/admin/Dockerfile
            guard: ${{ vars.ADMIN_API_URL }}
            build-args: |
              VITE_API_URL=${{ vars.ADMIN_API_URL }}
    steps:
      - name: Skip notice
        if: matrix.guard == ''
        run: echo "::warning::Bỏ qua image '${{ matrix.name }}' — chưa cấu hình repo variable bắt buộc (NEXT_PUBLIC_MEDIA_HOST / ADMIN_API_URL). Đặt Settings → Variables rồi push lại main."

      - uses: actions/checkout@v4
        if: matrix.guard != ''

      - uses: docker/setup-buildx-action@v3
        if: matrix.guard != ''

      - name: Log in to GHCR
        if: matrix.guard != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        if: matrix.guard != ''
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        if: matrix.guard != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
