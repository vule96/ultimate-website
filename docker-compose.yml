# DEV ONLY — Postgres cho phát triển local (Slice 1).
# Phase 0 sẽ mở rộng thêm Redis, app services, v.v.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ultimate_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog} -d ${POSTGRES_DB:-blog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # DEV ONLY — MinIO (S3-compatible) cho upload ảnh (Slice 3c).
  # Prod dùng Cloudflare R2 (cùng API S3) — chỉ đổi env STORAGE_*.
  minio:
    image: minio/minio:latest
    container_name: ultimate_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Tạo bucket + set policy public-read cho toàn bucket rồi thoát.
  minio-init:
    image: minio/mc:latest
    container_name: ultimate_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET:-blog-media} &&
      mc anonymous set download local/${STORAGE_BUCKET:-blog-media} &&
      echo 'minio bucket ready';
      "

volumes:
  postgres_data:
  minio_data:
