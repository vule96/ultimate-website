server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Assets có hash trong tên file → cache 1 năm, immutable.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback: mọi route trả index.html (TanStack Router xử lý client-side).
  location / {
    try_files $uri /index.html;
  }
}
